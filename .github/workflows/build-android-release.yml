name: Android Release build

on: 
  workflow_dispatch:
    inputs:
      version:
        description: MojoLauncher version
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        version: [ "3.2.3", "3.3.1", "3.3.2", "3.3.3", "3.3.6", "3.4.1" ]
      fail-fast: false

    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Fetch latest LWJGL artifacts
      uses: dawidd6/action-download-artifact@v8
      with:
        workflow: build-android.yml
        workflow_conclusion: success
        name: lwjgl3-${{ matrix.version}}-android-modules
        path: lwjgl3/bin/RELEASE
        use_unzip: true
    - name: Package for Android
      run: |
        export LWJGL_VERSION=${{matrix.version}}
        bash ci_prepare_jars.bash

    - name: Release artifacts
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ matrix.version }}-${{ inputs.version }}
        name: LWJGL ${{ matrix.version }} for Android
        files: |
          release_jars/*.jar
          release_jars/hashes.sha1
