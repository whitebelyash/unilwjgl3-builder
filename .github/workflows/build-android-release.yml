name: Android Release build

on: 
  workflow_dispatch:
    inputs:
      version:
        description: MojoLauncher version
        required: true
        type: string

jobs:
  build:
    strategy:
      matrix:
        version: [ "3.2.3", "3.3.1", "3.3.2", "3.3.3", "3.3.6", "3.4.1" ]
      fail-fast: false

    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: set up JDK 8
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 8

    - name: set up JDK 17
      if: ${{ matrix.version == '3.2.3' }}
      id: setup_jdk17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: set up JDK 21
      if: ${{ steps.setup_jdk17.outcome == 'skipped' }}
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 21


    - name: Build for Android
      run: |
        export JAVA8_HOME=$JAVA_HOME_8_${{runner.arch}}
        export LWJGL_VERSION=${{matrix.version}}
        export LIBFFI_VERSION=3.5.2
        bash ci_build_all.bash
        bash ci_prepare_jars.bash

    - name: Release artifacts
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ matrix.version }}-${{ inputs.version }}
        name: LWJGL ${{ matrix.version }} for MojoLauncher
        files: |
          release_jars/*.jar.*
          release_jars/hashes.sha1
