name: Android build

on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        version: [ "3.2.3", "3.3.1", "3.3.2", "3.3.3", "3.3.6", "3.4.1" ]
      fail-fast: false

    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: set up JDK 8
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 8

    - name: set up JDK 17
      if: ${{ matrix.version == '3.2.3' }}
      id: setup_jdk17
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 17

    - name: set up JDK 21
      if: ${{ steps.setup_jdk17.outcome == 'skipped' }}
      uses: actions/setup-java@v3
      with:
        distribution: temurin
        java-version: 21


    - name: Build for Android
      run: |
        export JAVA8_HOME=$JAVA_HOME_8_${{runner.arch}}
        export LWJGL_VERSION=${{matrix.version}}
        export LIBFFI_VERSION=3.5.2
        bash ci_build_all.bash

    - name: Upload modules release output
      uses: actions/upload-artifact@v4
      with:
        name: lwjgl3-${{matrix.version}}-android-modules
        path: lwjgl3/bin/RELEASE
